<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ice-clock</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="clock">

    <div class="digit">

<span id="hour">00</span>

<div class="water">

<svg class="water-svg" viewBox="0 0 100 100" preserveAspectRatio="none">

<mask id="hourMask" maskUnits="userSpaceOnUse">

<text
id="hourTens"
x="-3"
y="84.9"
font-size="82"
font-family="Segoe UI"
textLength="55"
lengthAdjust="spacingAndGlyphs"
fill="white">
1
</text>

<text
id="hourOnes"
x="50"
y="84.9"
font-size="82"
font-family="Segoe UI"
textLength="55"
lengthAdjust="spacingAndGlyphs"    
fill="white">
4
</text>
</mask>


<path
class="water-wave"
mask="url(#hourMask)"
d="M0,50
   Q25,40 50,50
   T100,50
   V100 H0 Z">
</path>

</svg>

</div>

</div>

        
 <span class="colon">:</span>   

        
       <div class="digit">

    <span id="minute">00</span>

    <div class="water">

        <svg class="water-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
            <path
                class="water-wave"
                d="M0,50 
                   Q25,40 50,50
                   T100,50
                   V100 H0 Z">
            </path>
        </svg>

    </div>

</div>
    </div>

</div>

    <script src="script.js"></script>
</body>
</html>
