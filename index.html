<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ice-clock</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="clock">

    <div class="digit">

    <span id="hour">00</span>
        

    <div class="water">

        <svg class="water-svg" viewBox="0 0 100 100" preserveAspectRatio="none">

        <mask id="digitMask">

<text
id="hourMaskText"
x="49"
y="78"
text-anchor="middle"
font-size="70"
font-family="inherit"
fill="white">
11
</text>

</mask>
            
<path
    class="water-wave"
    mask="url(#digitMask)"
    d="M0,50
       Q25,40 50,50
       T100,50
       V100 H0 Z">
</path>
        </svg>

    </div>

</div>

        
 <span class="colon">:</span>   

        
       <div class="digit">

    <span id="minute">00</span>

    <div class="water">

        <svg class="water-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
            <path
                class="water-wave"
                d="M0,50 
                   Q25,40 50,50
                   T100,50
                   V100 H0 Z">
            </path>
        </svg>

    </div>

</div>
    </div>

</div>

    <script src="script.js"></script>
</body>
</html>
